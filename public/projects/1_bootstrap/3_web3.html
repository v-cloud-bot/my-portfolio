    <!-- CONTACT US-->

    <br /><br /><br /><br />
    <div align="center" class="contact">
      <hr style="width: 30%; color: #000;" />
      <h2 style="text-align: center;" class="contact-title">CONTACT US</h2>
      <hr style="width: 30%; color: #000;" />
      <br /><br />

      <form name="f1" id="contact-form">
        <table
          align="center"
          cellpadding="5"
          cellspacing="12"
          border="1"
          height="200"
        >
          <tr>
            <td>
              <input
                type="text"
                name="first_name"
                placeholder="First Name"
                required="required"
              />
            </td>

            <td>
              <input
                type="text"
                name="Last_name"
                placeholder="Last Name"
                required="required"
              />
            </td>
          </tr>
          <tr>
            <td>
              <input
                type="email"
                name="email"
                placeholder="Email"
                required="required"
              />
            </td>
            <td>
              <input
                type="text"
                name="subject"
                placeholder="Subject"
                required="required"
              />
            </td>
          </tr>
          <tr>
            <th colspan="2">
              <textarea placeholder="Enter Message" required=""></textarea>
            </th>
          </tr>
          <tr>
            <th colspan="2">
              <input type="submit" name="contact-submit" value="SEND" />
            </th>
          </tr>
        </table>
      </form>
    </div>
